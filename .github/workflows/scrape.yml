name: Q14 - Seeds 41-50

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python - 23ds3000079@ds.study.iitm.ac.in
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Playwright
      run: |
        python -m pip install --upgrade pip
        pip install playwright
        pip show playwright  # Verify installation
        
    - name: Install Playwright browsers and dependencies
      run: |
        python -m playwright install chromium
        python -m playwright install-deps
        
    - name: Verify Playwright installation
      run: |
        python -c "import playwright; print('✅ Playwright installed')"
        python -c "from playwright.sync_api import sync_playwright; print('✅ Playwright sync_api works')"
        
    - name: Run scraper
      run: |
        python scrape.py
        
    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: scrape-results
        path: results.txt
        
    - name: Display results in summary
      if: always()
      run: |
        echo "## 📊 Q14 Results - Seeds 41-50" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f results.txt ]; then
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "*Generated by 23ds3000079@ds.study.iitm.ac.in*" >> $GITHUB_STEP_SUMMARY
