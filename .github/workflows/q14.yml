name: Q14 - Seeds 41-50

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python - 23ds3000079@ds.study.iitm.ac.in
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install requests
        run: pip install requests
        
      - name: Run scraper
        run: python q14.py
        
      - name: Show results
        run: |
          echo "## Q14 Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Grand Total: $(python q14.py | grep GRAND | tail -1 | cut -d' ' -f3)" >> $GITHUB_STEP_SUMMARY
